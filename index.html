<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteVault - Your Creative Workspace</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-vault"></i>
                <span>NoteVault</span>
            </div>
            <nav class="menu">
                <button class="menu-item active"><i class="fa-solid fa-house"></i> All Notes</button>
                <button class="menu-item"><i class="fa-solid fa-star"></i> Favorites</button>
                <button class="menu-item"><i class="fa-solid fa-trash"></i> Trash</button>
            </nav>
            <div class="sidebar-footer">
                <p>v1.0.0</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search notes by title or content...">
                </div>
                <button class="btn btn-primary" id="openModalBtn">
                    <i class="fa-solid fa-plus"></i> New Note
                </button>
            </header>

            <section class="notes-section">
                <div class="section-header">
                    <h2>My Notes <span id="note-count" class="badge">0</span></h2>
                </div>
                <div class="notes-grid" id="notesGrid">
                    </div>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="noteModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Create New Note</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="noteForm">
                <div class="form-group">
                    <label for="noteTitle">Title</label>
                    <input type="text" id="noteTitle" placeholder="Give your note a catchy title..." required>
                </div>
                <div class="form-group">
                    <label for="noteBody">Content</label>
                    <textarea id="noteBody" rows="8" placeholder="Type your brilliant ideas here..." required></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Note</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
